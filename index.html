<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Portfolio — [MART]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #222;
      --lb-bg:    #111111;
      --border:   #2e2e2e;
      --text:     #f0ece8;
      --muted:    #888;
      --accent:   #c9a96e;
      --font: 'DM Sans', sans-serif;
      --gap: 1.2rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; overflow-x: hidden; }

    /* HEADER & NAV */
    header {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo { font-size: 1.4rem; font-weight: 500; letter-spacing: 2px; color: var(--text); text-decoration: none; cursor: pointer; }
    
    nav ul { display: flex; gap: 2rem; list-style: none; }
    nav a { text-decoration: none; color: var(--muted); font-size: 0.9rem; font-weight: 400; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
    nav a:hover, nav a.active { color: var(--accent); }

    /* HAMBURGER MENU */
    .menu-toggle { display: none; background: none; border: 1px solid var(--muted); padding: 8px; cursor: pointer; border-radius: 4px; }
    .menu-toggle span { display: block; width: 20px; height: 2px; background: var(--muted); margin: 3px 0; }

    @media (max-width: 768px) {
      header { padding: 1rem; }
      .logo { font-size: 1.1rem; margin-right: auto; }
      .menu-toggle { display: block; order: 2; }
      nav { 
        position: absolute; top: 100%; left: 0; width: 100%; 
        background: var(--surface); border-bottom: 1px solid var(--border);
        max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
      }
      nav.open { max-height: 400px; }
      nav ul { flex-direction: column; gap: 0; padding: 1rem 0; }
      nav a { display: block; padding: 1.2rem; text-align: center; }
    }

    /* GRID */
    section { padding: 4rem 2rem; max-width: 1400px; margin: 0 auto; display: none; }
    section.active { display: block; }

    .page-header { margin-bottom: 3rem; text-align: center; }
    .page-header h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: -1px; }

    .insta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--gap); }
    @media (max-width: 600px) { .insta-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; } }

    .grid-item { position: relative; aspect-ratio: 1/1; background: var(--surface2); cursor: pointer; overflow: hidden; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; }

    .grid-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: 0.3s;
    }
    .grid-item:hover .grid-overlay { opacity: 1; }
    .grid-overlay svg { width: 32px; height: 32px; color: white; fill: none; stroke: currentColor; }

    /* LIGHTBOX */
    #lightbox {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .lb-content {
      position: relative; background: var(--lb-bg); max-width: 1000px; width: 100%;
      max-height: 90vh; display: flex; border: 1px solid var(--border);
    }
    .lb-media { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
    .lb-media img { max-width: 100%; max-height: 90vh; object-fit: contain; }
    
    .lb-info { width: 350px; padding: 2rem; border-left: 1px solid var(--border); overflow-y: auto; }

    .lb-nav-btn { position: absolute; background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px; cursor: pointer; border-radius: 50%; top: 50%; transform: translateY(-50%); }
    .lb-prev { left: 10px; }
    .lb-next { right: 10px; }

    @media (max-width: 900px) {
      .lb-content { flex-direction: column; overflow-y: auto; }
      .lb-info { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    }

    /* ABOUT & CONTACTS */
    .about-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; align-items: start; }
    @media (max-width: 820px) { .about-layout { grid-template-columns: 1fr; text-align: center; gap: 2rem; } }
    .artist-photo { width: 100%; max-width: 450px; border-radius: 50%; overflow: hidden; border: 3px solid var(--border); margin: 0 auto; aspect-ratio: 1/1;}
    .artist-photo img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.3); }
    .contact-item { display: block; padding: 1.2rem; border: 1px solid var(--border); margin-bottom: 1rem; text-decoration: none; color: var(--text); text-align: center; }

  </style>
</head>
<body>

  <header>
    <div class="logo" onclick="showPage('page-lavori')">[MART]</div>
    
    <button class="menu-toggle" onclick="toggleMenu(event)">
      <span></span><span></span><span></span>
    </button>

    <nav id="mainNav">
      <ul>
        <li><a onclick="showPage('page-lavori')">Lavori</a></li>
        <li><a onclick="showPage('page-flash')">Flash</a></li>
        <li><a onclick="showPage('page-video')">Video</a></li>
        <li><a onclick="showPage('page-contatti')">Contatti</a></li>
      </ul>
    </nav>
  </header>

  <section id="page-lavori" class="active">
    <div class="page-header"><h1>Lavori</h1></div>
    <div class="insta-grid">
      <div class="grid-item" data-images="bacio-batman-01.jpg,bacio-batman-02.jpg,bacio-batman-03.jpg,bacio-batman-04.jpg,bacio-batman-05.jpg" 
           data-caption="Lo sai che un bacio sotto il vischio può essere fatale? <br>Ma un bacio dato bene può essere altrettanto fatale!" 
           onclick="openLightbox(this)">
        <img src="bacio-batman-01.jpg">
        <div class="grid-overlay">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </div>
      </div>
      <div class="grid-item" data-images="margherite-01.jpg,margherite-02.jpg,margherite-03.jpg,margherite-04.jpg" 
           data-caption="Giusto 2 cose interessanti sulle margherite 🌼" 
           onclick="openLightbox(this)">
        <img src="margherite-01.jpg">
        <div class="grid-overlay">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </div>
      </div>
    </div>
  </section>

  <section id="page-flash">
    <div class="page-header"><h1>Flash</h1></div>
    <div class="insta-grid">
      <div class="grid-item" data-images="flash-001.jpg" data-caption="Flash Disponibile" onclick="openLightbox(this)">
        <img src="flash-001.jpg">
        <div class="grid-overlay"><svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
      </div>
    </div>
  </section>

  <section id="page-video">
    <div class="page-header"><h1>Video</h1></div>
    <div class="insta-grid">
      <div class="grid-item" onclick="window.open('https://www.instagram.com/reel/DTC0hWdDACg/', '_blank')">
        <img src="copertina-video-001.jpg">
        <div class="grid-overlay" style="opacity:1"><svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
      </div>
    </div>
  </section>

  <section id="page-contatti">
    <div class="about-layout">
      <div class="artist-photo"><img src="artista.jpg"></div>
      <div>
        <h1>About Mart</h1>
        <p>Specializzata in microrealismo e fineline.</p>
        <div style="margin-top:2rem">
          <a href="#" class="contact-item">Instagram</a>
          <a href="#" class="contact-item">WhatsApp</a>
        </div>
      </div>
    </div>
  </section>

  <div id="lightbox" onclick="closeLightbox(event)">
    <div class="lb-content" onclick="event.stopPropagation()">
      <div class="lb-media">
        <button class="lb-nav-btn lb-prev" onclick="changeImg(-1, event)">❮</button>
        <img id="lb-img" src="">
        <button class="lb-nav-btn lb-next" onclick="changeImg(1, event)">❯</button>
      </div>
      <div class="lb-info">
        <div id="lb-caption"></div>
      </div>
    </div>
  </div>

  <script>
    // CAMBIO PAGINA
    function showPage(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      const activeSection = document.getElementById(id);
      if(activeSection) activeSection.classList.add('active');
      document.getElementById('mainNav').classList.remove('open');
      window.scrollTo(0,0);
    }

    // MENU MOBILE
    function toggleMenu(e) {
      e.stopPropagation();
      document.getElementById('mainNav').classList.toggle('open');
    }

    // CHIUSURA MENU CLICCANDO FUORI
    document.addEventListener('click', () => {
      document.getElementById('mainNav').classList.remove('open');
    });

    // LIGHTBOX LOGIC
    let currentImgs = [];
    let imgIdx = 0;

    function openLightbox(el) {
      currentImgs = el.getAttribute('data-images').split(',');
      imgIdx = 0;
      updateLB();
      document.getElementById('lb-caption').innerHTML = el.getAttribute('data-caption');
      document.getElementById('lightbox').style.display = 'flex';
      document.body.style.overflow = 'hidden';

      // Gestione tasto indietro mobile
      history.pushState({lb: true}, "");
    }

    function updateLB() {
      document.getElementById('lb-img').src = currentImgs[imgIdx];
      document.querySelector('.lb-prev').style.display = currentImgs.length > 1 ? 'block' : 'none';
      document.querySelector('.lb-next').style.display = currentImgs.length > 1 ? 'block' : 'none';
    }

    function changeImg(step, e) {
      e.stopPropagation();
      imgIdx = (imgIdx + step + currentImgs.length) % currentImgs.length;
      updateLB();
    }

    function closeLightbox(e) {
      document.getElementById('lightbox').style.display = 'none';
      document.body.style.overflow = 'auto';
      // Se stiamo chiudendo via clic e c'è uno stato nella history, torniamo indietro
      if(history.state && history.state.lb) {
        history.back();
      }
    }

    // Tasto indietro del telefono
    window.onpopstate = function() {
      document.getElementById('lightbox').style.display = 'none';
      document.body.style.overflow = 'auto';
    };

    // Chiudi con tasto ESC
    document.addEventListener('keydown', (e) => {
      if(e.key === "Escape") closeLightbox();
    });
  </script>

</body>
</html>
