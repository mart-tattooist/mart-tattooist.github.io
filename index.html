<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Portfolio — MART</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --text: #f0ece8;
      --muted: #888;
      --accent: #c9a96e;
      --font: 'DM Sans', sans-serif;
      --border: #2e2e2e;
    }

    /* Blocca zoom e rimbalzi */
    html, body { 
      touch-action: pan-x pan-y; 
      user-select: none; 
      -webkit-user-select: none;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      margin: 0; padding: 0;
      overflow-x: hidden;
    }

    header { padding: 3rem 1rem; text-align: center; }
    header h1 { font-size: 2rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }

    nav { 
      position: sticky; top: 0; background: var(--bg); z-index: 100; 
      padding: 15px; display: flex; justify-content: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    nav button { 
      background: none; border: 1px solid var(--border); color: var(--text); 
      padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s;
    }
    nav button.active { background: var(--accent); color: #000; border-color: var(--accent); }

    .page { display: none; padding: 10px; max-width: 1200px; margin: 0 auto; }
    .page.visible { display: block; }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
      gap: 10px; 
    }

    .grid-item { cursor: pointer; position: relative; overflow: hidden; border-radius: 8px; }
    .grid-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; transition: 0.3s; }
    .grid-item:hover img { transform: scale(1.05); }

    /* Struttura Lightbox tipo Instagram */
    #lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.98);
      display: none;
      z-index: 2000;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }

    #lb-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      padding-top: 20px;
    }

    .lb-content {
      background: var(--surface);
      width: 100%;
      max-width: 500px;
      margin-bottom: 30px;
      flex-shrink: 0;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      border-radius: 0 0 12px 12px;
    }

    .img-container { position: relative; width: 100%; line-height: 0; background: #000; }
    #lb-img { width: 100%; height: auto; display: block; }

    #lb-dots {
      position: absolute; bottom: 15px; left: 50%;
      transform: translateX(-50%); display: flex; gap: 5px;
    }
    .lb-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; }
    .lb-dot.active { background: #fff; }

    #lb-caption { padding: 15px; background: var(--surface); }
    .caption-text {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; font-size: 0.95rem; color: var(--text);
    }
    .caption-text.expanded { -webkit-line-clamp: unset; }
    .read-more { color: var(--muted); font-size: 0.85rem; cursor: pointer; margin-top: 8px; display: inline-block; }
  </style>
</head>
<body>

  <header>
    <h1>MART</h1>
  </header>

  <nav>
    <button class="active" onclick="showPage('tatuaggi')">Tatuaggi</button>
    <button onclick="showPage('flash')">Flash</button>
  </nav>

  <div id="page-tatuaggi" class="page visible">
    <div class="grid">
      <div class="grid-item" onclick="openLightbox(this)" data-images="https://images.unsplash.com/photo-1550684848-fac1c5b4e853" data-caption="Galeone tradizionale realizzato su avambraccio.">
        <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853" alt="Tattoo 1">
      </div>
      <div class="grid-item" onclick="openLightbox(this)" data-images="https://images.unsplash.com/photo-1598371839696-5c5bb00bdc28" data-caption="Dettaglio rosa realistica in bianco e nero.">
        <img src="https://images.unsplash.com/photo-1598371839696-5c5bb00bdc28" alt="Tattoo 2">
      </div>
    </div>
  </div>

  <div id="page-flash" class="page">
    <div class="grid">
      <div class="grid-item" onclick="openLightbox(this)" data-images="https://images.unsplash.com/photo-1560707303-4e980ce876ad" data-caption="Flash disponibili per la prossima settimana.">
        <img src="https://images.unsplash.com/photo-1560707303-4e980ce876ad" alt="Flash 1">
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <div style="position:absolute; inset:0;" onclick="closeLightbox()"></div>
    <div id="lb-main">
      <div class="lb-content" onclick="event.stopPropagation()">
        <div class="img-container">
          <img id="lb-img" src="" alt="">
          <div id="lb-dots"></div>
        </div>
        <div id="lb-caption"></div>
      </div>
    </div>
  </div>

  <script>
    let lbImages = [], lbCurrent = 0, allPosts = [], postIndex = 0;

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
      document.getElementById('page-' + name).classList.add('visible');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    function openLightbox(el) {
      const activePage = document.querySelector('.page.visible');
      allPosts = Array.from(activePage.querySelectorAll('.grid-item'));
      postIndex = allPosts.indexOf(el);
      loadPost(el);
      document.getElementById('lightbox').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
      document.body.style.overflow = '';
    }

    function loadPost(el) {
      const raw = el.getAttribute('data-images') || '';
      lbImages = raw.split(',').map(s => s.trim());
      lbCurrent = 0;
      
      const caption = el.getAttribute('data-caption') || '';
      const capContainer = document.getElementById('lb-caption');
      capContainer.innerHTML = `
        <div class="caption-text" id="cap-text">${caption}</div>
        <span class="read-more" id="read-btn" onclick="expandText()">...altro</span>
      `;
      
      setTimeout(() => {
        const txt = document.getElementById('cap-text');
        if (txt.scrollHeight <= txt.offsetHeight) {
          document.getElementById('read-btn').style.display = 'none';
        }
      }, 100);

      buildDots();
      updateImg();
    }

    function expandText() {
      document.getElementById('cap-text').classList.add('expanded');
      document.getElementById('read-btn').style.display = 'none';
    }

    function buildDots() {
      const d = document.getElementById('lb-dots');
      d.innerHTML = '';
      if (lbImages.length > 1) {
        lbImages.forEach((_, i) => {
          const dot = document.createElement('div');
          dot.className = 'lb-dot' + (i === 0 ? ' active' : '');
          d.appendChild(dot);
        });
      }
    }

    function updateImg() {
      document.getElementById('lb-img').src = lbImages[lbCurrent];
      document.querySelectorAll('.lb-dot').forEach((d, i) => d.classList.toggle('active', i === lbCurrent));
    }

    // Swipe orizzontale
    let touchX = 0;
    document.querySelector('.img-container').addEventListener('touchstart', e => touchX = e.touches[0].clientX);
    document.querySelector('.img-container').addEventListener('touchend', e => {
      let diff = touchX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        lbCurrent = (lbCurrent + (diff > 0 ? 1 : -1) + lbImages.length) % lbImages.length;
        updateImg();
      }
    });
  </script>
</body>
</html>
